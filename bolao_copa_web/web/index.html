<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!--
    O valor de href é substituído pelo Flutter em `flutter run` / `flutter build`
    (token $FLUTTER_BASE_HREF). Se ficar incorreto, os assets não carregam e a página fica em branco.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Bolao Copa 2026">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Bolao Copa 2026">

  <title>Bolao Copa 2026</title>
  <link rel="manifest" href="manifest.json">

  <!-- Opcional: ícones após `flutter create . --platforms=web` -->
  <link rel="icon" type="image/png" href="favicon.png"/>
</head>
<body>
  <!-- Script no body, como na documentação oficial do Flutter Web -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>

me:
  get:
    tags: [Users]
    summary: Retorna perfil do usuario autenticado
    security: [{ bearerAuth: [] }]
    responses:
      "200":
        description: Perfil atual
        content:
          application/json:
            schema:
              $ref: "../openapi.yaml#/components/schemas/UserProfileResponse"
  put:
    tags: [Users]
    summary: Atualiza perfil do usuario autenticado
    security: [{ bearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/UserProfileUpdateRequest"
    responses:
      "200":
        description: Perfil atualizado
        content:
          application/json:
            schema:
              $ref: "../openapi.yaml#/components/schemas/UserProfileResponse"

collection:
  get:
    tags: [Ranking]
    summary: Lista ranking geral
    parameters:
      - in: query
        name: limit
        schema: { type: integer, default: 50, minimum: 1, maximum: 200 }
      - in: query
        name: offset
        schema: { type: integer, default: 0, minimum: 0 }
    responses:
      "200":
        description: Ranking ordenado por desempate oficial
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: "../openapi.yaml#/components/schemas/RankingItemResponse"
                total:
                  type: integer

me:
  get:
    tags: [Ranking]
    summary: Retorna posicao do usuario autenticado
    security: [{ bearerAuth: [] }]
    responses:
      "200":
        description: Posicao no ranking
        content:
          application/json:
            schema:
              $ref: "../openapi.yaml#/components/schemas/RankingItemResponse"

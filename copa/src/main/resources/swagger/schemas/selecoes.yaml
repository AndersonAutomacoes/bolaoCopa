SelecaoUpdateRequest:
  type: object
  properties:
    nome:
      type: string
    bandeiraUrl:
      type: string

SelecaoCreateRequest:
  type: object
  required: [nome, bandeiraUrl]
  properties:
    nome:
      type: string
      maxLength: 120
    bandeiraUrl:
      type: string

SelecaoResponse:
  type: object
  properties:
    id:
      type: integer
      format: int64
    nome:
      type: string
    bandeiraUrl:
      type: string
    createdAt:
      type: string
      format: date-time

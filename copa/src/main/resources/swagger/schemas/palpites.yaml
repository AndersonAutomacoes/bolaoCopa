PalpiteCreateRequest:
  type: object
  required: [jogoId, golsCasaPalpite, golsForaPalpite]
  properties:
    jogoId:
      type: integer
      format: int64
    golsCasaPalpite:
      type: integer
      minimum: 0
    golsForaPalpite:
      type: integer
      minimum: 0

PalpiteResponse:
  type: object
  properties:
    id:
      type: integer
      format: int64
    jogo:
      $ref: "./jogos.yaml#/JogoResponse"
    golsCasaPalpite:
      type: integer
    golsForaPalpite:
      type: integer
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

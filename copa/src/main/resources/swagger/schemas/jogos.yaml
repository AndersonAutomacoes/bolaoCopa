JogoCreateRequest:
  type: object
  required: [fase, kickoffAt, selecaoCasaId, selecaoForaId]
  properties:
    fifaMatchId:
      type: string
      maxLength: 100
    fase:
      type: string
      maxLength: 60
    rodada:
      type: string
      maxLength: 60
    estadio:
      type: string
      maxLength: 120
    kickoffAt:
      type: string
      format: date-time
    selecaoCasaId:
      type: integer
      format: int64
    selecaoForaId:
      type: integer
      format: int64

ResultadoOficialRequest:
  type: object
  required: [golsCasa, golsFora]
  properties:
    golsCasa:
      type: integer
      minimum: 0
    golsFora:
      type: integer
      minimum: 0

JogoResponse:
  type: object
  properties:
    id:
      type: integer
      format: int64
    fifaMatchId:
      type: [string, "null"]
    fase:
      type: string
    rodada:
      type: [string, "null"]
    estadio:
      type: [string, "null"]
    kickoffAt:
      type: string
      format: date-time
    status:
      type: string
      enum: [SCHEDULED, IN_PROGRESS, FINISHED]
    golsCasa:
      type: [integer, "null"]
    golsFora:
      type: [integer, "null"]
    selecaoCasa:
      $ref: "./selecoes.yaml#/SelecaoResponse"
    selecaoFora:
      $ref: "./selecoes.yaml#/SelecaoResponse"
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

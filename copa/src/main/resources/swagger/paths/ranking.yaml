collection:
  get:
    tags: [Ranking]
    summary: Ranking geral
    operationId: listRanking
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Posições ordenadas
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../schemas/ranking.yaml#/RankingItemResponse"

me:
  get:
    tags: [Ranking]
    summary: Posição do usuário autenticado no ranking
    operationId: getMyRanking
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Linha do ranking para o usuário
        content:
          application/json:
            schema:
              $ref: "../schemas/ranking.yaml#/RankingItemResponse"
      "404":
        description: Usuário sem palpites (ainda não entra no ranking materializado)

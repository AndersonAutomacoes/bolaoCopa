collection:
  get:
    tags: [Ranking]
    summary: Ranking geral ou por período (palpites cujo jogo tem kickoff no intervalo)
    operationId: listRanking
    security:
      - bearerAuth: []
    parameters:
      - name: period
        in: query
        required: false
        schema:
          type: string
          enum: [GLOBAL, WEEK, MONTH, SEMANAL, MENSAL]
          default: GLOBAL
        description: GLOBAL = materializado geral; WEEK/SEMANAL = semana civil (seg–dom, fuso America/Sao_Paulo); MONTH/MENSAL = mês civil corrente
      - name: nome
        in: query
        required: false
        schema:
          type: string
        description: Filtro por substring no nome ou email (sem distinção de maiúsculas)
    responses:
      "200":
        description: Posições ordenadas
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../schemas/ranking.yaml#/RankingItemResponse"

me:
  get:
    tags: [Ranking]
    summary: Posição do usuário autenticado no ranking
    operationId: getMyRanking
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Linha do ranking para o usuário
        content:
          application/json:
            schema:
              $ref: "../schemas/ranking.yaml#/RankingItemResponse"
      "404":
        description: Usuário sem palpites (ainda não entra no ranking materializado)

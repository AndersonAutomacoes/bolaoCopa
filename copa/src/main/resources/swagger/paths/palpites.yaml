create:
  post:
    tags: [Palpites]
    summary: Registrar palpite para um jogo
    operationId: createPalpite
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/palpites.yaml#/PalpiteCreateRequest"
    responses:
      "201":
        description: Palpite criado
        content:
          application/json:
            schema:
              $ref: "../schemas/palpites.yaml#/PalpiteResponse"
      "404":
        description: Jogo não encontrado
      "409":
        description: Conflito (palpite duplicado, jogo encerrado ou fora do prazo)

updateById:
  patch:
    tags: [Palpites]
    summary: Atualizar palpite até o horário de início do jogo
    operationId: updatePalpite
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/palpites.yaml#/PalpiteUpdateRequest"
    responses:
      "200":
        description: Palpite atualizado
        content:
          application/json:
            schema:
              $ref: "../schemas/palpites.yaml#/PalpiteResponse"
      "404":
        description: Palpite não encontrado
      "409":
        description: Conflito (fora do prazo ou jogo não agendado)

me:
  get:
    tags: [Palpites]
    summary: Listar palpites do usuário autenticado
    operationId: listMyPalpites
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Lista ordenada por data do jogo
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../schemas/palpites.yaml#/PalpiteResponse"

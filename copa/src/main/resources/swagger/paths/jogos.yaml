collection:
  get:
    tags: [Jogos]
    summary: Listar jogos
    operationId: listJogos
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Lista ordenada por data de início
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../schemas/jogos.yaml#/JogoResponse"
  post:
    tags: [Jogos]
    summary: Cadastrar jogo (admin)
    operationId: createJogo
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/jogos.yaml#/JogoCreateRequest"
    responses:
      "201":
        description: Jogo criado
        content:
          application/json:
            schema:
              $ref: "../schemas/jogos.yaml#/JogoResponse"
      "403":
        description: Sem permissão de administrador

item:
  get:
    tags: [Jogos]
    summary: Obter jogo por id
    operationId: getJogoById
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    responses:
      "200":
        description: Jogo encontrado
        content:
          application/json:
            schema:
              $ref: "../schemas/jogos.yaml#/JogoResponse"
      "404":
        description: Não encontrado
  patch:
    tags: [Jogos]
    summary: Atualizar jogo agendado (admin)
    operationId: updateJogo
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/jogos.yaml#/JogoUpdateRequest"
    responses:
      "200":
        description: Atualizado
        content:
          application/json:
            schema:
              $ref: "../schemas/jogos.yaml#/JogoResponse"
      "403":
        description: Sem permissão de administrador
      "404":
        description: Jogo não encontrado
      "409":
        description: Conflito de status ou dados
  delete:
    tags: [Jogos]
    summary: Excluir jogo agendado sem palpites (admin)
    operationId: deleteJogo
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    responses:
      "204":
        description: Removido
      "403":
        description: Sem permissão de administrador
      "404":
        description: Jogo não encontrado
      "409":
        description: Possui palpites ou status inválido

resultadoOficial:
  patch:
    tags: [Jogos]
    summary: Registrar resultado oficial e pontuar palpites (admin)
    operationId: registrarResultadoOficial
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/jogos.yaml#/ResultadoOficialRequest"
    responses:
      "200":
        description: Jogo atualizado e ranking materializado atualizado
        content:
          application/json:
            schema:
              $ref: "../schemas/jogos.yaml#/JogoResponse"
      "403":
        description: Sem permissão de administrador
      "404":
        description: Jogo não encontrado

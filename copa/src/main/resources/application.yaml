spring:
  application:
    name: copa

  datasource:
    url: jdbc:postgresql://localhost:5432/bolaoCopadb
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

security:
  jwt:
    secret: change-me-please-change-me-please-change-me-please
    expiration-minutes: 30
    refresh-expiration-days: 14
  mfa:
    issuer: copa